<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>饒平客語學習樂園 - 課程總目錄</title>
    <style>
        :root {
            --primary: #673AB7;         /* 總目錄用活潑的紫色 */
            --primary-light: #EDE7F6;   
            --primary-dark: #512DA8;    
            --bg: #F4F6F9;              
            --card-bg: #FFFFFF;
            --text: #333333;
        }
        * { box-sizing: border-box; font-family: 'Arial', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg); color: var(--text); margin: 0; padding-bottom: 30px; }
        
        header { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: white; text-align: center; padding: 30px 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        header h1 { margin: 0; font-size: 26px; letter-spacing: 2px; text-shadow: 1px 1px 2px rgba(0,0,0,0.2); }
        header p { margin: 10px 0 0 0; font-size: 15px; opacity: 0.9; }
        
        .container { padding: 20px; max-width: 600px; margin: 0 auto; }
        
        /* 課程大按鈕樣式 */
        .lesson-link { text-decoration: none; display: block; margin-bottom: 20px; }
        
        .lesson-card { background: var(--card-bg); border-radius: 20px; padding: 20px; display: flex; align-items: center; box-shadow: 0 6px 15px rgba(0,0,0,0.05); border: 2px solid #E0E0E0; transition: transform 0.1s, border-color 0.2s; }
        .lesson-card:active { transform: scale(0.98); }
        
        /* 每一課不同的主題顏色 */
        .lesson-card.l1 { border-left: 8px solid #1E88E5; } /* 藍色 */
        .lesson-card.l2 { border-left: 8px solid #4CAF50; } /* 綠色 */
        .lesson-card.l3 { border-left: 8px solid #FF9800; } /* 橘色 */
        
        .lesson-icon { font-size: 35px; margin-right: 20px; width: 50px; text-align: center; }
        
        .lesson-info { flex: 1; }
        .lesson-title { font-size: 20px; font-weight: bold; color: #333; margin: 0 0 5px 0; }
        .lesson-desc { font-size: 14px; color: #666; margin: 0; }
        
        .arrow-icon { font-size: 20px; color: #BBB; }
    </style>
</head>
<body>

    <header>
        <h1>饒平客語學習樂園 🎒</h1>
        <p>小朋友，今天想要挑戰哪一課呢？點選進去開始吧！</p>
    </header>

    <div class="container">
        
        <a href="lesson1.html" class="lesson-link">
            <div class="lesson-card l1">
                <div class="lesson-icon">🎒</div>
                <div class="lesson-info">
                    <p class="lesson-title">第一課：初見面</p>
                    <p class="lesson-desc">學習客語的「我」、「你」和日常生活問候語。</p>
                </div>
                <div class="arrow-icon">➔</div>
            </div>
        </a>

        <a href="lesson2.html" class="lesson-link">
            <div class="lesson-card l2">
                <div class="lesson-icon">🌳</div>
                <div class="lesson-info">
                    <p class="lesson-title">第二課：我的家庭</p>
                    <p class="lesson-desc">認識家中的重要成員「爸爸」與「媽媽」。</p>
                </div>
                <div class="arrow-icon">➔</div>
            </div>
        </a>

        <a href="lesson3.html" class="lesson-link">
            <div class="lesson-card l3">
                <div class="lesson-icon">🍊</div>
                <div class="lesson-info">
                    <p class="lesson-title">第三課：兄弟姊妹</p>
                    <p class="lesson-desc">學習稱呼「姊姊」與「弟弟」，以及相處的諺語。</p>
                </div>
                <div class="arrow-icon">➔</div>
            </div>
        </a>

    </div>

</body>
</html>
